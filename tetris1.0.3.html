<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>俄羅斯方塊</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: #0a0a12;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: 'Orbitron', monospace;
      padding: 24px 16px
    }

    #app {
      display: flex;
      gap: 20px;
      align-items: flex-start
    }

    #board-wrap {
      position: relative
    }

    canvas#board {
      display: block;
      border: 2px solid #2a2a4a;
      background: #0d0d1a
    }

    #side {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 120px
    }

    .panel {
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 12px
    }

    .panel-label {
      font-size: 7px;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px
    }

    .panel-val {
      font-size: 16px;
      color: #e0e0ff;
      font-weight: 700;
      letter-spacing: 1px
    }

    canvas#next {
      display: block;
      margin: 0 auto
    }

    button {
      width: 100%;
      background: #1a1a3a;
      border: 1px solid #4444aa;
      color: #8888ff;
      font-family: 'Orbitron', monospace;
      font-size: 8px;
      padding: 12px 6px;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all .15s
    }

    button:hover {
      background: #2a2a5a;
      border-color: #6666cc;
      color: #aaaaff
    }

    #btn-pause {
      background: #1a1a2a;
      border-color: #333366;
      color: #666699
    }

    #btn-pause:hover {
      background: #222244;
      color: #8888bb
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 5, 20, .88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px
    }

    #overlay h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: #8888ff;
      text-align: center;
      line-height: 1.8
    }

    #overlay p {
      font-size: 8px;
      color: #555577;
      letter-spacing: 1.5px;
      text-align: center
    }

    .hidden {
      display: none !important
    }

    #keys-hint {
      font-size: 7px;
      color: #33334a;
      line-height: 2.2;
      text-align: center
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="board-wrap">
      <canvas id="board" width="200" height="400"></canvas>
      <div id="overlay">
        <h2>TETRIS</h2>
        <p>PRESS START</p>
      </div>
    </div>
    <div id="side">
      <div class="panel">
        <div class="panel-label">HOLD</div>
        <canvas id="hold" width="80" height="80"></canvas>
      </div>
      <div class="panel">
        <div class="panel-label">NEXT</div>
        <canvas id="next" width="80" height="80"></canvas>
      </div>
      <div class="panel">
        <div class="panel-label">SCORE</div>
        <div class="panel-val" id="score">0</div>
      </div>
      <div class="panel">
        <div class="panel-label">LEVEL</div>
        <div class="panel-val" id="level">1</div>
      </div>
      <div class="panel">
        <div class="panel-label">LINES</div>
        <div class="panel-val" id="lines">0</div>
      </div>
      <button id="btn-start">START</button>
      <button id="btn-pause">PAUSE</button>
      <div class="panel" id="keys-hint">
        ← → 移動<br>↑ 旋轉<br>↓ 加速<br>SPC 直落<br>C HOLD
      </div>
    </div>
  </div>

  <script>
    const COLS = 10, ROWS = 20, SZ = 20;
    const COLORS = ['', '#ff4466', '#ffaa22', '#ffee33', '#44ee66', '#22ccff', '#aa55ff', '#ff6699'];
    const PIECES = [
      null,
      [[1, 1, 1, 1]],
      [[2, 2], [2, 2]],
      [[0, 3, 0], [3, 3, 3]],
      [[0, 4, 4], [4, 4, 0]],
      [[5, 5, 0], [0, 5, 5]],
      [[6, 0, 0], [6, 6, 6]],
      [[0, 0, 7], [7, 7, 7]]
    ];

    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const ncanvas = document.getElementById('next');
    const nctx = ncanvas.getContext('2d');
    const hcanvas = document.getElementById('hold');
    const hctx = hcanvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const linesEl = document.getElementById('lines');
    const overlay = document.getElementById('overlay');
    const overlayH = overlay.querySelector('h2');
    const overlayP = overlay.querySelector('p');

    let board, piece, pieceX, pieceY, pieceType, nextPiece, score, lines, level, running, paused, raf, lastTime, dropAcc, holdPiece, canHold;

    function newBoard() { return Array.from({ length: ROWS }, () => new Array(COLS).fill(0)) }
    function randPiece() { return Math.floor(Math.random() * 7) + 1 }
    function rotate(m) { return m[0].map((_, i) => m.map(r => r[i]).reverse()) }

    function spawn() {
      piece = PIECES[nextPiece];
      pieceType = nextPiece;
      pieceX = Math.floor((COLS - piece[0].length) / 2);
      pieceY = 0;
      canHold = true;
      nextPiece = randPiece();
      drawNext();
      if (collide(0, 0)) endGame();
    }

    function collide(dx, dy, p = piece) {
      for (let r = 0; r < p.length; r++)
        for (let c = 0; c < p[r].length; c++)
          if (p[r][c] && (board[pieceY + r + dy] === undefined || board[pieceY + r + dy][pieceX + c + dx] === undefined || board[pieceY + r + dy][pieceX + c + dx])) return true;
      return false;
    }

    function lock() {
      piece.forEach((row, r) => row.forEach((v, c) => { if (v) board[pieceY + r][pieceX + c] = v }));
      clearLines();
      spawn();
    }

    function clearLines() {
      let cleared = 0;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r].every(v => v)) {
          board.splice(r, 1);
          board.unshift(new Array(COLS).fill(0));
          cleared++; r++;
        }
      }
      if (cleared) {
        const pts = [0, 100, 300, 500, 800];
        score += pts[cleared] * level;
        lines += cleared;
        level = Math.floor(lines / 10) + 1;
        scoreEl.textContent = score;
        levelEl.textContent = level;
        linesEl.textContent = lines;
      }
    }

    function drawBlock(c2, x, y, color, sz = SZ) {
      c2.fillStyle = color;
      c2.fillRect(x * sz + 1, y * sz + 1, sz - 2, sz - 2);
      c2.fillStyle = 'rgba(255,255,255,0.18)';
      c2.fillRect(x * sz + 1, y * sz + 1, sz - 2, 3);
      c2.fillStyle = 'rgba(0,0,0,0.3)';
      c2.fillRect(x * sz + 1, y * sz + sz - 4, sz - 2, 3);
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (board[r][c]) drawBlock(ctx, c, r, COLORS[board[r][c]]);
      if (piece) {
        let ghost = pieceY;
        while (!collide(0, ghost - pieceY + 1)) ghost++;
        piece.forEach((row, r) => row.forEach((v, c) => {
          if (v) {
            ctx.globalAlpha = 0.18;
            drawBlock(ctx, pieceX + c, ghost + r, COLORS[v]);
            ctx.globalAlpha = 1;
            drawBlock(ctx, pieceX + c, pieceY + r, COLORS[v]);
          }
        }));
      }
      ctx.strokeStyle = '#1a1a2e';
      ctx.lineWidth = .5;
      for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r * SZ); ctx.lineTo(COLS * SZ, r * SZ); ctx.stroke() }
      for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c * SZ, 0); ctx.lineTo(c * SZ, ROWS * SZ); ctx.stroke() }
    }

    function drawNext() {
      nctx.clearRect(0, 0, 80, 80);
      nctx.fillStyle = '#0d0d1a';
      nctx.fillRect(0, 0, 80, 80);
      const p = PIECES[nextPiece];
      const sz = 16;
      const ox = Math.floor((80 - p[0].length * sz) / 2);
      const oy = Math.floor((80 - p.length * sz) / 2);
      p.forEach((row, r) => row.forEach((v, c) => {
        if (v) {
          nctx.fillStyle = COLORS[v];
          nctx.fillRect(ox + c * sz + 1, oy + r * sz + 1, sz - 2, sz - 2);
          nctx.fillStyle = 'rgba(255,255,255,0.18)';
          nctx.fillRect(ox + c * sz + 1, oy + r * sz + 1, sz - 2, 3);
        }
      }));
    }

    function drawHold() {
      hctx.clearRect(0, 0, 80, 80);
      hctx.fillStyle = '#0d0d1a';
      hctx.fillRect(0, 0, 80, 80);
      if (holdPiece === null) return;
      const p = PIECES[holdPiece];
      const sz = 16;
      const ox = Math.floor((80 - p[0].length * sz) / 2);
      const oy = Math.floor((80 - p.length * sz) / 2);
      p.forEach((row, r) => row.forEach((v, c) => {
        if (v) {
          hctx.fillStyle = canHold ? COLORS[v] : '#444466';
          hctx.fillRect(ox + c * sz + 1, oy + r * sz + 1, sz - 2, sz - 2);
          hctx.fillStyle = 'rgba(255,255,255,0.18)';
          hctx.fillRect(ox + c * sz + 1, oy + r * sz + 1, sz - 2, 3);
        }
      }));
    }

    function doHold() {
      if (!canHold) return;
      canHold = false;
      if (holdPiece === null) {
        holdPiece = pieceType;
        spawn();
      } else {
        const tmp = holdPiece;
        holdPiece = pieceType;
        nextPiece = tmp;
        spawn();
      }
      drawHold();
    }
    function drop() { if (!collide(0, 1)) pieceY++; else lock() }
    function hardDrop() { while (!collide(0, 1)) pieceY++; lock() }
    function rotateP() { const r = rotate(piece); if (!collide(0, 0, r)) piece = r }

    function startGame() {
      board = newBoard(); score = 0; lines = 0; level = 1;
      holdPiece = null; canHold = true;
      scoreEl.textContent = 0; levelEl.textContent = 1; linesEl.textContent = 0;
      nextPiece = randPiece(); spawn();
      running = true; paused = false; lastTime = performance.now(); dropAcc = 0;
      overlay.classList.add('hidden');
      if (raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(loop);
      drawHold();
    }

    function endGame() {
      running = false;
      overlayH.textContent = 'GAME OVER';
      overlayP.textContent = 'SCORE: ' + score;
      overlay.classList.remove('hidden');
    }

    function loop(t) {
      if (!running) return;
      if (!paused) {
        const dt = t - lastTime;
        dropAcc += dt;
        const interval = Math.max(100, 600 - level * 50);
        if (dropAcc > interval) { drop(); dropAcc = 0 }
        drawBoard();
      }
      lastTime = t;
      raf = requestAnimationFrame(loop);
    }

    document.addEventListener('keydown', e => {
      if (!running || paused) return;
      if (e.key === 'ArrowLeft') { e.preventDefault(); move(-1) }
      else if (e.key === 'ArrowRight') { e.preventDefault(); move(1) }
      else if (e.key === 'ArrowDown') { e.preventDefault(); drop() }
      else if (e.key === 'ArrowUp') { e.preventDefault(); rotateP() }
      else if (e.key === ' ') { e.preventDefault(); hardDrop() }
      else if (e.key === 'c' || e.key === 'C') { e.preventDefault(); doHold() }
    });

    document.getElementById('btn-start').onclick = startGame;
    document.getElementById('btn-pause').onclick = () => {
      if (!running) return;
      paused = !paused;
      document.getElementById('btn-pause').textContent = paused ? 'RESUME' : 'PAUSE';
      if (!paused) { cancelAnimationFrame(raf); lastTime = performance.now(); raf = requestAnimationFrame(loop) }
    };

    board = newBoard(); score = 0; lines = 0; level = 1;
    holdPiece = null; canHold = true; nextPiece = randPiece();
    drawBoard(); drawNext(); drawHold();
  </script>
</body>

</html>
