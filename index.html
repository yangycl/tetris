<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>俄羅斯方塊</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: #0a0a12;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: 'Orbitron', monospace;
      padding: 24px 16px
    }

    #app {
      display: flex;
      gap: 20px;
      align-items: flex-start
    }

    #board-wrap {
      position: relative
    }

    canvas#board {
      display: block;
      border: 2px solid #2a2a4a;
      background: #0d0d1a
    }

    #side {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 120px
    }

    .panel {
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 12px
    }

    .panel-label {
      font-size: 7px;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px
    }

    .panel-val {
      font-size: 16px;
      color: #e0e0ff;
      font-weight: 700;
      letter-spacing: 1px
    }

    canvas#next {
      display: block;
      margin: 0 auto
    }

    button {
      width: 100%;
      background: #1a1a3a;
      border: 1px solid #4444aa;
      color: #8888ff;
      font-family: 'Orbitron', monospace;
      font-size: 8px;
      padding: 12px 6px;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all .15s
    }

    button:hover {
      background: #2a2a5a;
      border-color: #6666cc;
      color: #aaaaff
    }

    #btn-pause {
      background: #1a1a2a;
      border-color: #333366;
      color: #666699
    }

    #btn-pause:hover {
      background: #222244;
      color: #8888bb
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 5, 20, .88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px
    }

    #overlay h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: #8888ff;
      text-align: center;
      line-height: 1.8
    }

    #overlay p {
      font-size: 8px;
      color: #555577;
      letter-spacing: 1.5px;
      text-align: center
    }

    .hidden {
      display: none !important
    }

    #opp-wrap {
      display: flex;
      flex-direction: column;
      align-items: center
    }

    #opp-label {
      font-size: 7px;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
      font-family: 'Orbitron', monospace
    }

    #mp-input {
      width: 100%;
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      color: #aaaaff;
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      padding: 7px 6px;
      border-radius: 4px;
      letter-spacing: 2px;
      text-transform: uppercase;
      outline: none;
      margin-bottom: 4px
    }

    #mp-input::placeholder { color: #333355 }
    #mp-input:focus { border-color: #4444aa }

    .mp-btn-row { display: flex; gap: 4px }
    .mp-btn-row button { padding: 8px 2px; font-size: 7px }

    #mp-code-display {
      font-size: 8px;
      color: #8888ff;
      margin-top: 6px;
      letter-spacing: 1px;
      text-align: center;
      word-break: break-all;
      min-height: 14px
    }

    #mp-status {
      font-size: 7px;
      color: #6666aa;
      margin-bottom: 8px;
      letter-spacing: 1px;
      min-height: 12px
    }

    #keys-hint {
      font-size: 7px;
      color: #33334a;
      line-height: 2.2;
      text-align: center
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="board-wrap">
      <canvas id="board" width="200" height="400"></canvas>
      <div id="overlay">
        <h2>TETRIS</h2>
        <p>PRESS START</p>
      </div>
    </div>
    <div id="opp-wrap" class="hidden">
      <div id="opp-label">Opponent</div>
      <canvas id="opp-board" width="160" height="320" style="border:2px solid #2a2a4a;background:#0d0d1a;display:block"></canvas>
    </div>
    <div id="side">
      <div class="panel">
        <div class="panel-label">HOLD</div>
        <canvas id="hold" width="80" height="80"></canvas>
      </div>
      <div class="panel">
        <div class="panel-label">NEXT</div>
        <canvas id="next" width="80" height="80"></canvas>
      </div>
      <div class="panel">
        <div class="panel-label">SCORE</div>
        <div class="panel-val" id="score">0</div>
      </div>
      <div class="panel">
        <div class="panel-label">LEVEL</div>
        <div class="panel-val" id="level">1</div>
      </div>
      <div class="panel">
        <div class="panel-label">LINES</div>
        <div class="panel-val" id="lines">0</div>
      </div>
      <button id="btn-start">START</button>
      <button id="btn-pause">PAUSE</button>
      <div class="panel" id="keys-hint">
        ← → 移動<br>↑ 旋轉<br>↓ 加速<br>SPC 直落<br>C HOLD
      </div>
      <div class="panel">
        <div class="panel-label">MULTIPLAYER</div>
        <div id="mp-status">未連線</div>
        <input id="mp-input" type="text" maxlength="8" placeholder="房間代碼" autocomplete="off">
        <div class="mp-btn-row">
          <button id="btn-random">隨機</button>
          <button id="btn-create">建立</button>
          <button id="btn-join">加入</button>
        </div>
        <div id="mp-code-display"></div>
      </div>
    </div>
  </div>

  <script>
    const COLS = 10, ROWS = 20, SZ = 20;
    const COLORS = ['', '#ff4466', '#ffaa22', '#ffee33', '#44ee66', '#22ccff', '#aa55ff', '#ff6699', '#556677'];
    const PIECES = [
      null,
      [[1, 1, 1, 1]],
      [[2, 2], [2, 2]],
      [[0, 3, 0], [3, 3, 3]],
      [[0, 4, 4], [4, 4, 0]],
      [[5, 5, 0], [0, 5, 5]],
      [[6, 0, 0], [6, 6, 6]],
      [[0, 0, 7], [7, 7, 7]]
    ];

    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const ncanvas = document.getElementById('next');
    const nctx = ncanvas.getContext('2d');
    const hcanvas = document.getElementById('hold');
    const hctx = hcanvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const linesEl = document.getElementById('lines');
    const overlay = document.getElementById('overlay');
    const overlayH = overlay.querySelector('h2');
    const overlayP = overlay.querySelector('p');

    let board, piece, pieceX, pieceY, pieceType, nextPiece, score, lines, level, running, paused, raf, lastTime, dropAcc, holdPiece, canHold;

    function newBoard() { return Array.from({ length: ROWS }, () => new Array(COLS).fill(0)) }
    function randPiece() { return Math.floor(Math.random() * 7) + 1 }
    function rotate(m) { return m[0].map((_, i) => m.map(r => r[i]).reverse()) }

    function spawn() {
      piece = PIECES[nextPiece];
      pieceType = nextPiece;
      pieceX = Math.floor((COLS - piece[0].length) / 2);
      pieceY = 0;
      canHold = true;
      nextPiece = randPiece();
      drawNext();
      if (collide(0, 0)) endGame();
    }

    function collide(dx, dy, p = piece) {
      for (let r = 0; r < p.length; r++)
        for (let c = 0; c < p[r].length; c++)
          if (p[r][c] && (board[pieceY + r + dy] === undefined || board[pieceY + r + dy][pieceX + c + dx] === undefined || board[pieceY + r + dy][pieceX + c + dx])) return true;
      return false;
    }

    function lock() {
      piece.forEach((row, r) => row.forEach((v, c) => { if (v) board[pieceY + r][pieceX + c] = v }));
      clearLines();
      sendBoard();
      spawn();
    }

    function clearLines() {
      let cleared = 0;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r].every(v => v)) {
          board.splice(r, 1);
          board.unshift(new Array(COLS).fill(0));
          cleared++; r++;
        }
      }
      if (cleared) {
        const pts = [0, 100, 300, 500, 800];
        score += pts[cleared] * level;
        lines += cleared;
        level = Math.floor(lines / 10) + 1;
        scoreEl.textContent = score;
        levelEl.textContent = level;
        linesEl.textContent = lines;
        sendGarbage(cleared > 1 ? cleared - 1 : 0);
      }
    }

    function drawBlock(c2, x, y, color, sz = SZ) {
      c2.fillStyle = color;
      c2.fillRect(x * sz + 1, y * sz + 1, sz - 2, sz - 2);
      c2.fillStyle = 'rgba(255,255,255,0.18)';
      c2.fillRect(x * sz + 1, y * sz + 1, sz - 2, 3);
      c2.fillStyle = 'rgba(0,0,0,0.3)';
      c2.fillRect(x * sz + 1, y * sz + sz - 4, sz - 2, 3);
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (board[r][c]) drawBlock(ctx, c, r, COLORS[board[r][c]]);
      if (piece) {
        let ghost = pieceY;
        while (!collide(0, ghost - pieceY + 1)) ghost++;
        piece.forEach((row, r) => row.forEach((v, c) => {
          if (v) {
            ctx.globalAlpha = 0.18;
            drawBlock(ctx, pieceX + c, ghost + r, COLORS[v]);
            ctx.globalAlpha = 1;
            drawBlock(ctx, pieceX + c, pieceY + r, COLORS[v]);
          }
        }));
        if (mpMode && conn && conn.open) {
          const now = performance.now();
          if (now - lastBoardSend > 66) { // ~15fps
            lastBoardSend = now;
            conn.send({ type: 'board', board: board, piece: piece, pieceX: pieceX, pieceY: pieceY });
          }
        }
      }
      ctx.strokeStyle = '#1a1a2e';
      ctx.lineWidth = .5;
      for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r * SZ); ctx.lineTo(COLS * SZ, r * SZ); ctx.stroke() }
      for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c * SZ, 0); ctx.lineTo(c * SZ, ROWS * SZ); ctx.stroke() }
    }

    function drawNext() {
      nctx.clearRect(0, 0, 80, 80);
      nctx.fillStyle = '#0d0d1a';
      nctx.fillRect(0, 0, 80, 80);
      const p = PIECES[nextPiece];
      const sz = 16;
      const ox = Math.floor((80 - p[0].length * sz) / 2);
      const oy = Math.floor((80 - p.length * sz) / 2);
      p.forEach((row, r) => row.forEach((v, c) => {
        if (v) {
          nctx.fillStyle = COLORS[v];
          nctx.fillRect(ox + c * sz + 1, oy + r * sz + 1, sz - 2, sz - 2);
          nctx.fillStyle = 'rgba(255,255,255,0.18)';
          nctx.fillRect(ox + c * sz + 1, oy + r * sz + 1, sz - 2, 3);
        }
      }));
    }

    function drawHold() {
      hctx.clearRect(0, 0, 80, 80);
      hctx.fillStyle = '#0d0d1a';
      hctx.fillRect(0, 0, 80, 80);
      if (holdPiece === null) return;
      const p = PIECES[holdPiece];
      const sz = 16;
      const ox = Math.floor((80 - p[0].length * sz) / 2);
      const oy = Math.floor((80 - p.length * sz) / 2);
      p.forEach((row, r) => row.forEach((v, c) => {
        if (v) {
          hctx.fillStyle = canHold ? COLORS[v] : '#444466';
          hctx.fillRect(ox + c * sz + 1, oy + r * sz + 1, sz - 2, sz - 2);
          hctx.fillStyle = 'rgba(255,255,255,0.18)';
          hctx.fillRect(ox + c * sz + 1, oy + r * sz + 1, sz - 2, 3);
        }
      }));
    }

    function doHold() {
      if (!canHold) return;
      canHold = false;
      if (holdPiece === null) {
        holdPiece = pieceType;
        spawn();
      } else {
        const tmp = holdPiece;
        holdPiece = pieceType;
        nextPiece = tmp;
        spawn();
      }
      drawHold();
    }
    function move(dx) { if (!collide(dx, 0)) pieceX += dx }
    function drop() { if (!collide(0, 1)) pieceY++; else lock() }
    function hardDrop() { while (!collide(0, 1)) pieceY++; lock() }
    function rotateP() { const r = rotate(piece); if (!collide(0, 0, r)) piece = r }

    function startGame() {
      board = newBoard(); score = 0; lines = 0; level = 1;
      holdPiece = null; canHold = true;
      scoreEl.textContent = 0; levelEl.textContent = 1; linesEl.textContent = 0;
      nextPiece = randPiece(); spawn();
      running = true; paused = false; lastTime = performance.now(); dropAcc = 0;
      overlay.classList.add('hidden');
      if (raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(loop);
      drawHold();
    }

    function endGame() {
      running = false;
      if (mpMode && conn && conn.open) conn.send({ type: 'gameover' });
      overlayH.textContent = 'GAME OVER';
      overlayP.textContent = 'SCORE: ' + score;
      overlay.classList.remove('hidden');
    }

    function loop(t) {
      if (!running) return;
      if (!paused) {
        const dt = t - lastTime;
        dropAcc += dt;
        const interval = Math.max(100, 600 - level * 50);
        if (dropAcc > interval) { drop(); dropAcc = 0 }
        drawBoard();
      }
      lastTime = t;
      raf = requestAnimationFrame(loop);
    }

    document.addEventListener('keydown', e => {
      if (!running || paused) return;
      if (e.key === 'ArrowLeft') { e.preventDefault(); move(-1) }
      else if (e.key === 'ArrowRight') { e.preventDefault(); move(1) }
      else if (e.key === 'ArrowDown') { e.preventDefault(); drop() }
      else if (e.key === 'ArrowUp') { e.preventDefault(); rotateP() }
      else if (e.key === ' ') { e.preventDefault(); hardDrop() }
      else if (e.key === 'c' || e.key === 'C') { e.preventDefault(); doHold() }
    });

    document.getElementById('btn-start').onclick = startGame;
    document.getElementById('btn-pause').onclick = () => {
      if (!running) return;
      paused = !paused;
      document.getElementById('btn-pause').textContent = paused ? 'RESUME' : 'PAUSE';
      if (!paused) { cancelAnimationFrame(raf); lastTime = performance.now(); raf = requestAnimationFrame(loop) }
    };

    board = newBoard(); score = 0; lines = 0; level = 1;
    holdPiece = null; canHold = true; nextPiece = randPiece();
    drawBoard(); drawNext(); drawHold();

    // ===== MULTIPLAYER (WebRTC via PeerJS) =====
    const OPP_SZ = 16;
    let peer = null, conn = null, mpMode = false, oppBoard = null, oppGameOver = false;
    let oppPiece = null, oppPieceX = 0, oppPieceY = 0;
    let heartbeatTx = null, heartbeatRx = null, lastPing = 0;
    let lastBoardSend = 0;
    const oppCanvas = document.getElementById('opp-board');
    const oppCtx = oppCanvas.getContext('2d');
    const mpStatus = document.getElementById('mp-status');
    const mpCodeDisplay = document.getElementById('mp-code-display');

    function sendBoard() {
      if (mpMode && conn && conn.open) conn.send({
        type: 'board', board: board,
        piece: piece, pieceX: pieceX, pieceY: pieceY
      });
    }

    function sendGarbage(n) {
      if (mpMode && conn && conn.open && n > 0) conn.send({ type: 'garbage', n: n });
    }

    function addGarbage(n) {
      for (let i = 0; i < n; i++) {
        board.shift();
        const hole = Math.floor(Math.random() * COLS);
        board.push(Array.from({ length: COLS }, (_, c) => c === hole ? 0 : 8));
      }
    }

    function drawOppBoard() {
      oppCtx.clearRect(0, 0, oppCanvas.width, oppCanvas.height);
      oppCtx.fillStyle = '#0d0d1a';
      oppCtx.fillRect(0, 0, oppCanvas.width, oppCanvas.height);
      if (oppBoard) {
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++)
            if (oppBoard[r][c]) {
              oppCtx.fillStyle = COLORS[oppBoard[r][c]] || '#556677';
              oppCtx.fillRect(c * OPP_SZ + 1, r * OPP_SZ + 1, OPP_SZ - 2, OPP_SZ - 2);
              oppCtx.fillStyle = 'rgba(255,255,255,0.18)';
              oppCtx.fillRect(c * OPP_SZ + 1, r * OPP_SZ + 1, OPP_SZ - 2, 3);
            }
        if (oppPiece) {
          oppPiece.forEach((row, r) => row.forEach((v, c) => {
            if (v) {
              oppCtx.fillStyle = COLORS[v];
              oppCtx.fillRect((oppPieceX + c) * OPP_SZ + 1, (oppPieceY + r) * OPP_SZ + 1, OPP_SZ - 2, OPP_SZ - 2);
              oppCtx.fillStyle = 'rgba(255,255,255,0.18)';
              oppCtx.fillRect((oppPieceX + c) * OPP_SZ + 1, (oppPieceY + r) * OPP_SZ + 1, OPP_SZ - 2, 3);
            }
          }));
        }
      }
      oppCtx.strokeStyle = '#1a1a2e'; oppCtx.lineWidth = .5;
      for (let r = 0; r <= ROWS; r++) { oppCtx.beginPath(); oppCtx.moveTo(0, r * OPP_SZ); oppCtx.lineTo(COLS * OPP_SZ, r * OPP_SZ); oppCtx.stroke(); }
      for (let c = 0; c <= COLS; c++) { oppCtx.beginPath(); oppCtx.moveTo(c * OPP_SZ, 0); oppCtx.lineTo(c * OPP_SZ, ROWS * OPP_SZ); oppCtx.stroke(); }
      if (oppGameOver) {
        oppCtx.fillStyle = 'rgba(5,5,20,0.82)';
        oppCtx.fillRect(0, 0, oppCanvas.width, oppCanvas.height);
        oppCtx.fillStyle = '#8888ff';
        oppCtx.font = 'bold 10px Orbitron';
        oppCtx.textAlign = 'center';
        oppCtx.fillText('GAME', oppCanvas.width / 2, oppCanvas.height / 2 - 8);
        oppCtx.fillText('OVER', oppCanvas.width / 2, oppCanvas.height / 2 + 8);
      }
    }

    function startHeartbeat() {
      lastPing = Date.now();
      heartbeatTx = setInterval(() => {
        if (conn && conn.open) conn.send({ type: 'ping' });
      }, 2000);
      heartbeatRx = setInterval(() => {
        if (Date.now() - lastPing > 9000) handleDisconnect(); // 需連續 4 次 ping 都沒到才斷
      }, 1000);
    }

    function stopHeartbeat() {
      clearInterval(heartbeatTx); heartbeatTx = null;
      clearInterval(heartbeatRx); heartbeatRx = null;
    }

    function handleDisconnect() {
      if (!mpMode) return;
      stopHeartbeat();
      mpMode = false;
      mpStatus.textContent = '對手已離線';
      document.getElementById('opp-wrap').classList.add('hidden');
      if (running) {
        running = false;
        overlayH.textContent = '對手離線';
        overlayP.textContent = '連線中斷';
        overlay.classList.remove('hidden');
      }
    }

    function setupConn(c) {
      conn = c;
      conn.on('open', () => {
        mpMode = true;
        mpStatus.textContent = '✓ 已連線';
        mpCodeDisplay.textContent = '';
        document.getElementById('opp-wrap').classList.remove('hidden');
        oppBoard = newBoard(); oppGameOver = false;
        drawOppBoard();
        startHeartbeat();
        startGame();
      });
      conn.on('data', data => {
        lastPing = Date.now(); // 任何封包都重置計時
        if (data.type === 'ping') return;
        if (data.type === 'board') {
          oppBoard = data.board;
          oppPiece = data.piece || null;
          oppPieceX = data.pieceX || 0;
          oppPieceY = data.pieceY || 0;
          oppGameOver = false; drawOppBoard();
        } else if (data.type === 'gameover') {
          oppGameOver = true; drawOppBoard();
          if (running) {
            running = false;
            overlayH.textContent = 'YOU WIN!';
            overlayP.textContent = 'OPPONENT LOST';
            overlay.classList.remove('hidden');
          }
        } else if (data.type === 'garbage') {
          addGarbage(data.n);
        }
      });
      conn.on('close', () => handleDisconnect());
      conn.on('error', () => handleDisconnect());
    }

    function destroyPeer() {
      stopHeartbeat();
      if (conn) { try { conn.close(); } catch (e) {} conn = null; }
      if (peer) { try { peer.destroy(); } catch (e) {} peer = null; }
      mpMode = false;
      document.getElementById('opp-wrap').classList.add('hidden');
    }

    function randomMatch() {
      mpStatus.textContent = '搜尋中...';
      mpCodeDisplay.textContent = '';
      destroyPeer();
      const bucket = Math.floor(Date.now() / 20000); // 20 秒時間窗
      const roomId = 'ttr-rnd-' + bucket;
      peer = new Peer(roomId, { debug: 0 });
      peer.on('open', () => {
        mpStatus.textContent = '等待對手加入...';
        mpCodeDisplay.textContent = '(隨機配對中)';
        peer.on('connection', c => setupConn(c));
      });
      peer.on('error', err => {
        if (err.type === 'unavailable-id') {
          // 已有人在等待，直接連過去
          peer = new Peer({ debug: 0 });
          peer.on('open', () => {
            mpStatus.textContent = '找到對手！連線中...';
            setupConn(peer.connect(roomId));
          });
          peer.on('error', e2 => { mpStatus.textContent = '連線失敗: ' + e2.type; });
        } else {
          mpStatus.textContent = '錯誤: ' + err.type;
        }
      });
    }

    function createRoom() {
      let code = document.getElementById('mp-input').value.trim().toUpperCase();
      if (!code) code = Math.random().toString(36).slice(2, 7).toUpperCase();
      document.getElementById('mp-input').value = code;
      const roomId = 'ttr-room-' + code;
      destroyPeer();
      peer = new Peer(roomId, { debug: 0 });
      peer.on('open', () => {
        mpStatus.textContent = '等待對手加入...';
        mpCodeDisplay.textContent = '代碼：' + code;
        peer.on('connection', c => setupConn(c));
      });
      peer.on('error', err => {
        mpStatus.textContent = err.type === 'unavailable-id' ? '代碼已被使用，換一個' : '錯誤: ' + err.type;
      });
    }

    function joinRoom() {
      const code = document.getElementById('mp-input').value.trim().toUpperCase();
      if (!code) { mpStatus.textContent = '請輸入房間代碼'; return; }
      const roomId = 'ttr-room-' + code;
      destroyPeer();
      peer = new Peer({ debug: 0 });
      peer.on('open', () => {
        mpStatus.textContent = '連線中...';
        setupConn(peer.connect(roomId));
      });
      peer.on('error', err => { mpStatus.textContent = '錯誤: ' + err.type; });
    }

    document.getElementById('btn-random').onclick = randomMatch;
    document.getElementById('btn-create').onclick = createRoom;
    document.getElementById('btn-join').onclick = joinRoom;
  </script>
</body>

</html>
